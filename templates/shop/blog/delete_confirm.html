{% extends 'base.html' %}

{% block title %}Delete Blog Post - Flora{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 80px auto; padding: 0 20px;">
    <div style="background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); text-align: center;">
        <i class="fas fa-exclamation-triangle" style="font-size: 60px; color: #E74C3C; margin-bottom: 20px; display: block;"></i>

        <h1 style="color: var(--text-dark); margin-bottom: 15px;">Delete Blog Post?</h1>

        <p style="color: var(--text-light); font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
            Are you sure you want to delete this blog post? <strong>"{{ blog.title }}"</strong>
        </p>

        <p style="color: #E74C3C; font-weight: 600; margin-bottom: 30px;">
            <i class="fas fa-info-circle"></i> This action cannot be undone.
        </p>

        <!-- Buttons -->
        <div style="display: flex; gap: 15px; flex-direction: column;">
            <form method="POST">
                {% csrf_token %}
                <button 
                    type="submit" 
                    style="width: 100%; padding: 12px; background-color: #E74C3C; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background-color 0.2s;"
                    onmouseover="this.style.backgroundColor='#C0392B';"
                    onmouseout="this.style.backgroundColor='#E74C3C';"
                >
                    <i class="fas fa-trash"></i> Yes, Delete Permanently
                </button>
            </form>

            <a 
                href="{% url 'shop:blog_detail' blog.id %}" 
                style="padding: 12px 20px; background-color: #E0E0E0; color: var(--text-dark); border-radius: 5px; text-decoration: none; font-weight: 600; display: block; transition: background-color 0.2s;"
                onmouseover="this.style.backgroundColor='#D0D0D0';"
                onmouseout="this.style.backgroundColor='#E0E0E0';"
            >
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </div>
</div>

<style>
    .container {
        animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}
