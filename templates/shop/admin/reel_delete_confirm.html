{% extends "base.html" %}

{% block title %}Delete Style Reel - Flora Admin{% endblock %}

{% block content %}
<div class="container" style="max-width:560px;margin:3rem auto;">
    <div style="background:#fff;padding:2rem;border-radius:16px;box-shadow:0 10px 28px rgba(232,122,150,0.12);">
        <h1 style="margin-bottom:0.75rem;">Delete this reel?</h1>
        <p style="color:var(--text-light);margin-bottom:1.25rem;">
            <strong>{{ reel.title|default:"Untitled reel" }}</strong> will be removed from the homepage permanently.
        </p>
        {% if reel.video %}
        <video src="{{ reel.video.url }}" controls playsinline muted style="width:100%;max-height:320px;border-radius:12px;background:#111;margin-bottom:1.25rem;"></video>
        {% endif %}
        <form method="post" style="display:flex;gap:0.75rem;flex-wrap:wrap;">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary" style="background:#C0392B;"><i class="fas fa-trash"></i> Yes, delete</button>
            <a href="{% url 'shop:admin_reels' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
